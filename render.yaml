# Render Blueprint for Etsy AI Growth Agent
# Docs: https://render.com/docs/blueprint-spec
#
# How to deploy:
#   1. Render Dashboard → New → Blueprint → pick repo invf/etsy-ai-growth-agent.
#   2. Render reads this file and proposes: 1 Postgres, 1 Key Value (Redis),
#      and 2 services (backend API, Celery worker+beat). The frontend lives on
#      Vercel — see the note further down.
#   3. Fill the secrets in the "etsy-agent-secrets" env group (marked sync:false
#      below) — nothing secret is committed to git.
#   4. After the first deploy, set FRONTEND_URL (Vercel URL) and ETSY_REDIRECT_URI
#      on the backend, then redeploy.
#
# COST ($7/mo MVP setup):
#   - backend runs on `free` (sleeps after 15m idle → ~50s cold start; fine
#     pre-launch). free web has no preDeployCommand, so the backend runs
#     `alembic upgrade head` at startup (idempotent).
#   - worker + beat are combined into ONE Starter worker via `-B` (embedded
#     beat). Render has no free plan for `type: worker`, so this is the one
#     paid service ($7/mo). Split them back out for higher throughput later.
#   - Postgres + Key Value stay `free` (free Postgres expires after 90 days).
#   - frontend is on Vercel (Hobby, free, no cold-start sleep).

databases:
  - name: etsy-agent-db
    databaseName: etsy_agent
    user: etsy_agent
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"

services:
  # ---------------------------------------------------------------------------
  # Redis / Key Value — Celery broker + result backend, rate limiter, credits,
  # redbeat schedule. All share db 0 (distinct key prefixes, no collisions).
  # ---------------------------------------------------------------------------
  - type: redis
    name: etsy-agent-redis
    plan: free
    region: frankfurt
    ipAllowList: []            # internal-only (reachable from other Render services)
    maxmemoryPolicy: allkeys-lru

  # ---------------------------------------------------------------------------
  # Backend API (FastAPI / uvicorn). Runs Alembic migrations before each deploy.
  # ---------------------------------------------------------------------------
  - type: web
    name: etsy-agent-backend
    runtime: docker
    region: frankfurt
    plan: free               # sleeps after 15m idle (~50s cold start) — fine pre-launch
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # free plan has no preDeployCommand → run migrations at startup (idempotent)
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: etsy-agent-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: etsy-agent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: etsy-agent-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: etsy-agent-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: etsy-agent-redis
          type: redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: AI_MODEL_PRIMARY
        value: claude-fable-5
      - key: AI_MODEL_FAST
        value: claude-haiku-4-5
      # SET AFTER FIRST DEPLOY → your Vercel URL, e.g. https://etsy-ai-growth-agent.vercel.app
      - key: FRONTEND_URL
        sync: false
      # SET AFTER FIRST DEPLOY → https://etsy-agent-backend.onrender.com/v1/stores/connect/callback
      - key: ETSY_REDIRECT_URI
        sync: false
      - fromGroup: etsy-agent-secrets

  # ---------------------------------------------------------------------------
  # Celery worker + beat (combined) — runs SEO analysis, sync, daily-agent
  # fan-out tasks AND schedules the daily fan-out at 07:00 UTC via embedded
  # beat (`-B`) with the RedBeat scheduler. The only paid service ($7/mo).
  # ---------------------------------------------------------------------------
  - type: worker
    name: etsy-agent-worker
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.celery_app worker -B -S redbeat.RedBeatScheduler --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: etsy-agent-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: etsy-agent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: etsy-agent-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: etsy-agent-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: etsy-agent-redis
          type: redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: AI_MODEL_PRIMARY
        value: claude-fable-5
      - key: AI_MODEL_FAST
        value: claude-haiku-4-5
      - fromGroup: etsy-agent-secrets

  # NOTE: the frontend (Next.js) is deployed separately on Vercel, not Render.
  # Set its env vars in the Vercel dashboard:
  #   NEXT_PUBLIC_API_URL=https://etsy-agent-backend.onrender.com/v1
  #   NEXTAUTH_URL=https://<your-app>.vercel.app
  #   AUTH_SECRET / NEXTAUTH_SECRET=<openssl rand -hex 32>
  #   NEXT_PUBLIC_PADDLE_ENV=sandbox
  #   NEXT_PUBLIC_PADDLE_CLIENT_TOKEN=<paddle client token>
  # Then set FRONTEND_URL on the backend (above) to the Vercel URL for CORS.

# -----------------------------------------------------------------------------
# Shared secret env group — fill these in the Render dashboard after the
# Blueprint is created (Render → Env Groups → etsy-agent-secrets). They are
# attached to the backend and worker services.
# -----------------------------------------------------------------------------
envVarGroups:
  - name: etsy-agent-secrets
    envVars:
      - key: SECRET_KEY
        sync: false                 # JWT signing — `openssl rand -hex 32`
      - key: ETSY_TOKEN_ENCRYPTION_KEY
        sync: false                 # MUST be 64 hex chars — `openssl rand -hex 32`
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: ETSY_CLIENT_ID
        sync: false
      - key: ETSY_CLIENT_SECRET
        sync: false
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_CLIENT_TOKEN
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      - key: PADDLE_ENVIRONMENT
        value: sandbox
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: hello@etsyagent.com
      - key: SENTRY_DSN
        sync: false
